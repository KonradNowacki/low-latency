title: My Backend Blog
description: >-
  Notes on distributed systems, JVM internals, and building things that scale.
baseurl: ""
url: ""

author: Your Name
email: you@example.com

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  syntax_highlighter: rouge
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
